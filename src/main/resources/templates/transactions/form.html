<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Transaction - SaveWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
        <link rel="icon"
          th:href="@{/images/favicon.ico}"
          type="image/x-icon">

    <style>
        body{
            background-color:#F5F9F7;
        }

        .navbar-savewise{
            background:#0F172A;
        }

        .logo{
            height:60px;
        }

        .btn-savewise{
            background:#34D399;
            border:none;
            color:white;
        }

        .btn-savewise:hover{
            background:#10B981;
            color:white;
        }

        .card-form{
            border-radius:15px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-savewise">
    <div class="container">
        <img src="/images/logo.png" alt="SaveWise Logo" style="height:120px;">
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow card-form">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        New Transaction
                    </h2>

                    <form th:action="@{/transactions/save}"
                          th:object="${transaction}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">
                                Title
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{title}">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('title')}"
                                 th:errors="*{title}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Amount
                            </label>

                            <input type="number"
                                   step="0.01"
                                   min="0"
                                   class="form-control"
                                   th:field="*{amount}"
                                   required>

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('amount')}"
                                 th:errors="*{amount}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Date
                            </label>

                            <input type="date"
                                   class="form-control"
                                   th:field="*{date}"
                                   required>

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('date')}"
                                 th:errors="*{date}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Type
                            </label>

                            <select class="form-select"
                                    th:field="*{type}"
                                    required>

                                <option value="">
                                    Select type
                                </option>

                                <option th:each="type : ${types}"
                                        th:value="${type}"
                                        th:text="${type}">
                                </option>

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Category
                            </label>

                            <select class="form-select"
                                    th:field="*{category}"
                                    required>

                                <option value="">
                                    Select category
                                </option>

                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">
                                </option>

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Description
                            </label>

                            <textarea class="form-control"
                                      rows="4"
                                      th:field="*{description}">
                            </textarea>
                        </div>

                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-savewise">
                                Save Transaction
                            </button>

                            <a href="/transactions"
                               class="btn btn-secondary">
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
