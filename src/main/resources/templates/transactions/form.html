<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Transaction - SaveWise</title>
</head>
<body>

    <h1>New Transaction</h1>

    <form th:action="@{/transactions/save}"
          th:object="${transaction}"
          method="post">

        <div>
            <label>Title</label>
            <input type="text"
                   th:field="*{title}"
                   required>
        </div>

        <br>

        <div>
            <label>Amount</label>
            <input type="number"
                   step="0.01"
                   min="0"
                   th:field="*{amount}"
                   required>
        </div>

        <br>

        <div>
            <label>Date</label>
            <input type="date"
                   th:field="*{date}"
                   required>
        </div>

        <br>

        <div>
            <label>Type</label>

            <select th:field="*{type}" required>
                <option value="">Select type</option>

                <option th:each="type : ${types}"
                        th:value="${type}"
                        th:text="${type}">
                </option>
            </select>
        </div>

        <br>

        <div>
            <label>Category</label>

            <select th:field="*{category}" required>
                <option value="">Select category</option>

                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}">
                </option>
            </select>
        </div>

        <br>

        <div>
            <label>Description</label>

            <textarea th:field="*{description}"
                      rows="4"
                      cols="40">
            </textarea>
        </div>

        <br>

        <button type="submit">
            Save Transaction
        </button>

    </form>

    <br>

    <a href="/transactions">
        Back to Transactions
    </a>

</body>
</html>
