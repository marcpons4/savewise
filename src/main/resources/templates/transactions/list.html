<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transactions - SaveWise</title>
</head>
<body>

    <h1>Transactions</h1>

    <a href="/transactions/new">
        New Transaction
    </a>

    <br><br>

    <table border="1">

        <thead>
            <tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Type</th>
                <th>Category</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="transaction : ${transactions}">

                <td th:text="${transaction.title}"></td>

                <td th:text="${transaction.amount}"></td>

                <td th:text="${transaction.date}"></td>

                <td th:text="${transaction.type}"></td>

                <td th:text="${transaction.category.name}"></td>

                <td th:text="${transaction.description}"></td>

                <td>
                    <a th:href="@{/transactions/delete/{id}(id=${transaction.id})}">
                        Delete
                    </a>
                </td>

            </tr>

        </tbody>

    </table>

    <br>

    <a href="/dashboard">
        Back to Dashboard
    </a>

</body>
</html>
