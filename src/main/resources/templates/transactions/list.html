<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transactions - SaveWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="icon"
          th:href="@{/images/favicon.ico}"
          type="image/x-icon">

    <style>
        body{
            background-color:#F5F9F7;
        }

        .navbar-savewise{
            background:#0F172A;
        }

        .logo{
            height:60px;
        }

        .btn-savewise{
            background:#34D399;
            border:none;
            color:white;
        }

        .btn-savewise:hover{
            background:#10B981;
            color:white;
        }

        .table-card{
            border-radius:15px;
            overflow:hidden;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-savewise">
    <div class="container">
        <img src="/images/logo.png" alt="SaveWise Logo" style="height:120px;">
    </div>
</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Transactions</h1>

        <a href="/transactions/new"
           class="btn btn-savewise">
            + New Transaction
        </a>

    </div>

    <div class="card shadow-sm table-card">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Title</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="transaction : ${transactions}">

                            <td th:text="${transaction.title}"></td>

                            <td>
                                <span th:text="${transaction.amount}"></span> €
                            </td>

                            <td th:text="${transaction.date}"></td>

                            <td>
                                <span th:text="${transaction.type}"></span>
                            </td>

                            <td th:text="${transaction.category.name}"></td>

                            <td th:text="${transaction.description}"></td>

                            <td>
                                <a th:href="@{/transactions/delete/{id}(id=${transaction.id})}"
                                   class="btn btn-danger btn-sm">
                                    Delete
                                </a>
                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <div class="mt-4">

        <a href="/dashboard"
           class="btn btn-secondary">
            ← Dashboard
        </a>

    </div>

</div>

</body>
</html>
