<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Categories - SaveWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
        <link rel="icon"
          th:href="@{/images/favicon.ico}"
          type="image/x-icon">

    <style>
        body{
            background-color:#F5F9F7;
        }

        .navbar-savewise{
            background:#0F172A;
        }

        .btn-savewise{
            background:#34D399;
            border:none;
            color:white;
        }

        .btn-savewise:hover{
            background:#10B981;
            color:white;
        }

        .logo{
            height:60px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-savewise">
    <div class="container">
        <img src="/images/logo.png" alt="SaveWise Logo" style="height:120px;">
    </div>
</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Categories</h1>

        <a href="/categories/new"
           class="btn btn-savewise">
            + New Category
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-striped">

                <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="cat : ${categories}">
                    <td th:text="${cat.name}"></td>
                    <td th:text="${cat.description}"></td>

                    <td>
                        <a th:href="@{/categories/delete/{id}(id=${cat.id})}"
                           class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>

    <div class="mt-4">

        <a href="/dashboard"
           class="btn btn-secondary">
            ← Dashboard
        </a>

    </div>

</div>

</body>
</html>
