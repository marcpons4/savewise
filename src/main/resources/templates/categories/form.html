<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Category</title>
</head>
<body>

<h1>New Category</h1>

<form th:action="@{/categories/save}"
      th:object="${category}"
      method="post">

    <input
        type="text"
        th:field="*{name}"
        placeholder="Name">

    <br><br>

    <input
        type="text"
        th:field="*{description}"
        placeholder="Description">

    <br><br>

    <button type="submit">
        Save
    </button>

</form>

</body>
</html>
