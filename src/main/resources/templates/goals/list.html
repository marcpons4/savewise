<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Savings Goals - SaveWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

        <link rel="icon"
          th:href="@{/images/favicon.ico}"
          type="image/x-icon">

    <style>
        body{
            background-color:#F5F9F7;
        }

        .navbar-savewise{
            background:#0F172A;
        }

        .logo{
            height:60px;
        }

        .btn-savewise{
            background:#34D399;
            border:none;
            color:white;
        }

        .btn-savewise:hover{
            background:#10B981;
            color:white;
        }

        .table-card{
            border-radius:15px;
            overflow:hidden;
        }

        .progress{
            height:25px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-savewise">
    <div class="container">
        <img src="/images/logo.png" alt="SaveWise Logo" style="height:120px;">
    </div>
</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Savings Goals</h1>

        <a href="/goals/new"
           class="btn btn-savewise">
            + New Goal
        </a>

    </div>

    <div class="card shadow-sm table-card">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Goal</th>
                            <th>Target</th>
                            <th>Saved</th>
                            <th>Progress</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>

                    <tr th:each="goal : ${goals}">

                        <td th:text="${goal.title}"></td>

                        <td>
                            <span th:text="${goal.targetAmount}"></span> €
                        </td>

                        <td>
                            <span th:text="${goal.currentAmount}"></span> €
                        </td>

                        <td style="min-width:220px;">

                            <div th:if="${goal.currentAmount != null and goal.targetAmount != null and goal.targetAmount > 0}">

                                <div class="progress">

                                    <div class="progress-bar bg-success"
                                        role="progressbar"
                                        th:style="|width:${(goal.currentAmount * 100) / goal.targetAmount}%;|">

                                        <span th:text="${#numbers.formatDecimal((goal.currentAmount * 100) / goal.targetAmount,1,0) + '%'}">
                                        </span>

                                    </div>

                                </div>

                            </div>

                            <div th:unless="${goal.currentAmount != null and goal.targetAmount != null and goal.targetAmount > 0}">
                                0%
                            </div>

                        </td>

                        <td>
                            <a th:href="@{/goals/update/{id}(id=${goal.id})}"
                                class="btn btn-primary btn-sm">
                                    Update
                            </a>

                            <a th:href="@{/goals/delete/{id}(id=${goal.id})}"
                               class="btn btn-danger btn-sm">
                                Delete
                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <div class="mt-4">

        <a href="/dashboard"
           class="btn btn-secondary">
            ← Dashboard
        </a>

    </div>

</div>

</body>
</html>
