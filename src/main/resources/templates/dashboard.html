<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>SaveWise Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
    <link rel="icon"
        th:href="@{/images/favicon.ico}"
        type="image/x-icon">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div class="mb-5">

        <h1 class="fw-bold">
            Dashboard
        </h1>

        <p class="text-muted">
            Control your personal finances at a glance.
        </p>

    </div>

    <div class="row g-4">

        <div class="col-lg-4">

            <div class="card dashboard-card card-income">

                <div class="card-body text-center">

                    <h6 class="text-muted">
                        Income
                    </h6>

                    <div class="stat-value text-success"
                         th:text="${income} + ' €'">
                    </div>

                </div>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="card dashboard-card card-expenses">

                <div class="card-body text-center">

                    <h6 class="text-muted">
                        Expenses
                    </h6>

                    <div class="stat-value text-danger"
                         th:text="${expenses} + ' €'">
                    </div>

                </div>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="card dashboard-card card-balance">

                <div class="card-body text-center">

                    <h6 class="text-muted">
                        Balance
                    </h6>

                    <div class="stat-value"
                         th:text="${balance} + ' €'">
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="row mt-4 g-4">

        <div class="col-md-6">

            <div class="card dashboard-card">

                <div class="card-body">

                    <h6 class="text-muted">
                        Categories
                    </h6>

                    <h3 th:text="${totalCategories}"></h3>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card dashboard-card">

                <div class="card-body">

                    <h6 class="text-muted">
                        Transactions
                    </h6>

                    <h3 th:text="${totalTransactions}"></h3>

                </div>

            </div>

        </div>

    </div>

    <div class="mt-5">

        <h4 class="mb-3">
            Quick Actions
        </h4>

        <div class="quick-actions d-flex flex-wrap gap-3">

            <a href="/categories"
               class="btn btn-savewise">
                Categories
            </a>

            <a href="/transactions"
               class="btn btn-savewise">
                Transactions
            </a>

            <a href="/goals"
               class="btn btn-savewise">
                Goals
            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
